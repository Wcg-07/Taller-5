<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Wilson Castro Garcia">
    <title>Ejemplo tablas  3</title>
    <script src="../js/utilidades.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, serif;
            font-size: 13px;
            background-color: #fff;
            color: #000;
        }

        .barraMenu {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            border-bottom: 1px solid #ccc;
            gap: 4px;
        }

        .barraMenu a {
            color: blue;
            text-decoration: none;
            padding: 0 10px;
            font-size: 14px;
        }

        .barraMenu a:hover {
            text-decoration: underline;
        }

        .pipeSeparador {
            color: #999;
            font-size: 14px;
        }

        .layoutPrincipal {
            display: flex;
            padding: 16px;
            gap: 16px;
        }

        .seccionIzquierda {
            width: 300px;
            flex-shrink: 0;
            border: 1px solid #aaa;
            padding: 10px;
        }

        .etiquetaGrupo {
            font-size: 12px;
            color: #555;
            margin-bottom: 8px;
        }

        .fotoGrande {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
            margin-bottom: 10px;
        }

        .parrafoIzq {
            font-size: 12px;
            line-height: 1.6;
            margin-bottom: 10px;
            color: #222;
        }

        .seccionCentro {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
        }

        .fotoMediana {
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
        }

        .parrafoCentro {
            font-size: 12px;
            line-height: 1.6;
            color: #222;
        }

        .seccionDerecha {
            width: 130px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .fotoMini {
            width: 100%;
            height: 80px;
            object-fit: cover;
            display: block;
        }
    </style>

</head>

<body>

    <script>

        function generarTag(tagName) {
            var nuevoElemento = document.createElement(tagName);
            return nuevoElemento;
        }

        function generarTagConTexto(tagName, contenido) {
            var nuevoElemento = document.createElement(tagName);
            var nodoDeTexto = document.createTextNode(contenido);
            nuevoElemento.appendChild(nodoDeTexto);
            return nuevoElemento;
        }

        function generarTagImagen(src, altText) {
            var imgTag = generarTag("img");
            imgTag.src = src;
            imgTag.alt = altText;
            return imgTag;
        }

        function agregarAlBody(nodo) {
            document.body.appendChild(nodo);
        }

        function generarTagEnlace(url, textoVisible) {
            var tagA = generarTagConTexto("a", textoVisible);
            tagA.href = url;
            return tagA;
        }

        function agregarHijo(hijo, padre) {
            padre.appendChild(hijo);
        }

        var textoLorem1 = "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.";
        var textoLorem2 = "Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.";
        var textoLorem3 = "Nemo enim ipsam voluptatem quia voluptas sit aspernatur aut odit aut fugit.";

      
        var navMenu = generarTag("nav");
        navMenu.classList.add("barraMenu");

        var itemsMenu = [
            "Opción 1",
            "Opción 2",
            "Opción 3",
            "Opción 4",
            "Opción 5",
            "Opción 6"
        ];

        for (var m = 0; m < itemsMenu.length; m++) {
            var linkMenu = generarTagEnlace("#", itemsMenu[m]);
            agregarHijo(linkMenu, navMenu);

            if (m < itemsMenu.length - 1) {
                var pipe = generarTagConTexto("span", "|");
                pipe.classList.add("pipeSeparador");
                agregarHijo(pipe, navMenu);
            }
        }

        agregarAlBody(navMenu);

        var layoutPrincipal = generarTag("div");
        layoutPrincipal.classList.add("layoutPrincipal");


        var seccionIzquierda = generarTag("div");
        seccionIzquierda.classList.add("seccionIzquierda");

        var etiquetaGrupo = generarTagConTexto("p", "Group Name");
        etiquetaGrupo.classList.add("etiquetaGrupo");
        agregarHijo(etiquetaGrupo, seccionIzquierda);

        var fotoGrande = generarTagImagen(
            "../recursos/imagenes/Nevado.webp",
            "imagen principal"
        );
        fotoGrande.classList.add("fotoGrande");
        agregarHijo(fotoGrande, seccionIzquierda);

        var pIzq1 = generarTagConTexto("p", textoLorem1);
        pIzq1.classList.add("parrafoIzq");
        agregarHijo(pIzq1, seccionIzquierda);

        var pIzq2 = generarTagConTexto("p", textoLorem2);
        pIzq2.classList.add("parrafoIzq");
        agregarHijo(pIzq2, seccionIzquierda);

        var pIzq3 = generarTagConTexto("p", textoLorem3);
        pIzq3.classList.add("parrafoIzq");
        agregarHijo(pIzq3, seccionIzquierda);

        agregarHijo(seccionIzquierda, layoutPrincipal);

        var seccionCentro = generarTag("div");
        seccionCentro.classList.add("seccionCentro");

        var fotoMediana = generarTagImagen(
            "../recursos/imagenes/mar.webp",
            "imagen 2"
        );
        fotoMediana.classList.add("fotoMediana");
        agregarHijo(fotoMediana, seccionCentro);

        var pCentro = generarTagConTexto("p", textoLorem2);
        pCentro.classList.add("parrafoCentro");
        agregarHijo(pCentro, seccionCentro);

        agregarHijo(seccionCentro, layoutPrincipal);

        var seccionDerecha = generarTag("div");
        seccionDerecha.classList.add("seccionDerecha");

        var rutasMiniaturas = [
            ["../recursos/imagenes/paramo.webp", "imagen 3"],
            ["../recursos/imagenes/Montañas.webp", "imagen 4"],
            ["../recursos/imagenes/desierto.webp", "imagen 5"],
            ["../recursos/imagenes/isla.webp", "imagen 6"],
            ["../recursos/imagenes/llano.webp", "imagen 7"]
        ];

        for (var n = 0; n < rutasMiniaturas.length; n++) {
            var miniatura = generarTagImagen(
                rutasMiniaturas[n][0],
                rutasMiniaturas[n][1]
            );
            miniatura.classList.add("fotoMini");
            agregarHijo(miniatura, seccionDerecha);
        }

        agregarHijo(seccionDerecha, layoutPrincipal);

        agregarAlBody(layoutPrincipal);

    </script>

    <a href="../index.html">Volver al inicio</a>

</body>

</html>
